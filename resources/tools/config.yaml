id: Config
name: Config
description: |-
  Get or set Puffer Code configuration settings.
handler: runtime:workflow:config
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    setting:
      type: string
      description: The setting key, such as theme, model, editorMode, default_model, or openai_headers.
    value:
      description: The new value; omit to get current value.
      oneOf:
        - type: "null"
        - type: string
        - type: boolean
        - type: integer
        - type: object
          additionalProperties:
            type: string
  required:
    - setting
  additionalProperties: false
