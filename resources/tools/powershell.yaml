id: PowerShell
name: PowerShell
description: |-
  Executes a given PowerShell command with optional timeout. Working directory
  persists between commands; shell state (variables, functions) does not.

  IMPORTANT: This tool is for terminal operations via PowerShell: git, npm,
  docker, and PowerShell cmdlets. DO NOT use it for file operations (reading,
  writing, editing, searching, finding files) - use the specialized tools for
  this instead.

  PowerShell edition: unknown - assume Windows PowerShell 5.1 for compatibility
  - Do NOT use `&&`, `||`, ternary `?:`, null-coalescing `??`, or
    null-conditional `?.`. These are PowerShell 7+ only and parser-error on
    5.1.
  - To chain commands conditionally: `A; if ($?) { B }`. Unconditionally:
    `A; B`.

  Before executing the command, please follow these steps:
  1. Directory verification:
     - If the command will create new directories or files, first use
       `Get-ChildItem` (or `ls`) to verify the parent directory exists and is
       the correct location
  2. Command execution:
     - Always quote file paths that contain spaces with double quotes
     - Capture the output of the command

  PowerShell syntax notes:
  - Variables use `$` prefix: `$myVar = "value"`
  - Escape character is backtick (`` ` ``), not backslash
  - Use Verb-Noun cmdlet naming: `Get-ChildItem`, `Set-Location`, `New-Item`, `Remove-Item`
  - Common aliases: `ls` (`Get-ChildItem`), `cd` (`Set-Location`), `cat` (`Get-Content`), `rm` (`Remove-Item`)
  - Pipe operator `|` works similarly to bash but passes objects, not text
  - Use `Select-Object`, `Where-Object`, `ForEach-Object` for filtering and transformation
  - String interpolation: `"Hello $name"` or `"Hello $($obj.Property)"`
  - Registry access uses PSDrive prefixes: `HKLM:\SOFTWARE\...`, `HKCU:\...` - not raw `HKEY_LOCAL_MACHINE\...`
  - Environment variables: read with `$env:NAME`, set with `$env:NAME = "value"`
  - Call a native executable with spaces in its path via the call operator:
    `& "C:\Program Files\App\app.exe" arg1 arg2`

  Interactive and blocking commands (will hang - this tool runs with
  `-NonInteractive`):
  - NEVER use `Read-Host`, `Get-Credential`, `Out-GridView`,
    `$Host.UI.PromptForChoice`, or `pause`
  - Destructive cmdlets (`Remove-Item`, `Stop-Process`, `Clear-Content`, etc.)
    may prompt for confirmation. Add `-Confirm:$false` when you intend the
    action to proceed. Use `-Force` for read-only or hidden items.
  - Never use `git rebase -i`, `git add -i`, or other commands that open an
    interactive editor

  Passing multiline strings (commit messages, file content) to native
  executables:
  - Use a single-quoted here-string so PowerShell does not expand `$` or
    backticks inside. The closing `'@` MUST be at column 0 (no leading
    whitespace) on its own line.
  - Use `@'...'@` (single-quoted, literal) not `@"..."@` (double-quoted,
    interpolated) unless you need variable expansion
  - For arguments containing `-`, `@`, or other characters PowerShell parses
    as operators, use the stop-parsing token: `git log --% --format=%H`

  Usage notes:
  - The `command` argument is required.
  - You can specify an optional timeout in milliseconds (up to 600000ms / 10
    minutes). If not specified, commands will timeout after 120000ms (2
    minutes).
  - It is very helpful if you write a clear, concise `description` of what the
    command does.
  - You can use `run_in_background` to run the command in the background. Only
    use this if you do not need the result immediately and are OK being
    notified when the command completes later.
  - Avoid using PowerShell for commands that have dedicated tools, unless
    explicitly instructed:
    - File search: use `Glob` (not `Get-ChildItem -Recurse`)
    - Content search: use `Grep` (not `Select-String`)
    - Read files: use `Read` (not `Get-Content`)
    - Edit files: use `Edit`
    - Write files: use `Write` (not `Set-Content` or `Out-File`)
    - Communication: output text directly (not `Write-Output` or `Write-Host`)
  - When issuing multiple commands:
    - If the commands are independent and can run in parallel, make multiple
      `PowerShell` tool calls in a single message.
    - If the commands depend on each other and must run sequentially, chain
      them in a single `PowerShell` call.
    - Use `;` only when you need to run commands sequentially but do not care
      if earlier commands fail.
    - Do NOT use newlines to separate commands.
  - Do NOT prefix commands with `cd` or `Set-Location` -- the working
    directory is already set to the correct project directory automatically.
  - Avoid unnecessary `Start-Sleep` commands:
    - Do not sleep between commands that can run immediately.
    - If your command is long running and you would like to be notified when it
      finishes, run it using `run_in_background`.
    - Do not retry failing commands in a sleep loop; diagnose the root cause or
      consider an alternative approach.
    - If waiting for a background task you started with `run_in_background`, do
      not poll.
    - If you must poll an external process, use a check command rather than
      sleeping first.
    - If you must sleep, keep the duration short (1-5 seconds).
  - For git commands:
    - Prefer to create a new commit rather than amending an existing commit.
    - Before running destructive operations (for example `git reset --hard`,
      `git push --force`, `git checkout --`), consider whether there is a safer
      alternative that achieves the same goal.
    - Never skip hooks (`--no-verify`) or bypass signing (`--no-gpg-sign`,
      `-c commit.gpgsign=false`) unless the user has explicitly asked for it.
handler: runtime:workflow:powershell
approval_policy: on-request
sandbox_policy: workspace-write
display:
  group: shell
  title: PowerShell
  show_in_status: true
input_schema:
  type: object
  properties:
    command:
      type: string
      description: The PowerShell command to execute.
    timeout:
      type: integer
      description: Optional timeout in milliseconds. Use only when you need a non-default limit.
    description:
      type: string
      description: Clear, concise description of what this command does in active voice.
    run_in_background:
      type: boolean
      description: Set to true to run this command in the background when you do not need the result immediately.
    dangerouslyDisableSandbox:
      type: boolean
      description: Set true to override sandboxing and run unsandboxed.
  required:
    - command
  additionalProperties: false
