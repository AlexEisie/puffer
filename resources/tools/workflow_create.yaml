id: WorkflowCreate
name: WorkflowCreate
description: |-
  Create a workflow from a connection trigger and action.

  A workflow is a connection plus Puffer-side filter that triggers one action
  or YAML action graph. Use this after the connection exists and the action has
  been validated.
handler: runtime:workflow:workflow_create
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    slug:
      type: string
      description: Stable kebab-case workflow slug.
    description:
      type: string
    connection_slug:
      type: string
      description: Authorized connection slug.
    filter:
      type: object
      description: Optional Puffer-side JSON, regex, or limited path-expression filter.
    pattern:
      type: string
      description: Optional shorthand regex filter against event text.
    classify_prompt:
      type: string
      description: Optional classifier prompt.
    classify_model:
      type: string
      description: Optional classifier model hint.
    action:
      type: object
      description: Workflow action JSON.
    yaml_action:
      type: string
      description: Workflow action YAML or action graph YAML.
    enabled:
      type: boolean
      description: Whether the workflow starts enabled. Defaults to true.
  required: [slug, connection_slug]
  anyOf:
    - required: [action]
    - required: [yaml_action]
  additionalProperties: false
