id: WorkflowCreate
name: WorkflowCreate
description: |-
  Create a workflow from a connection trigger and action.

  A workflow is a connection plus Puffer-side filter that triggers one action
  or YAML action graph. Use this after the action has been validated. If the
  connection does not exist yet, provide connector_slug or use a suggested
  connection name such as `telegram-user` or `email` so Puffer can stage a
  planned connection workflow.

  To save every matching message to `/tmp/hi`, use `pattern: hi` and:
    yaml_action: |
      type: file_append
      path: /tmp/hi
handler: runtime:workflow:workflow_create
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    slug:
      type: string
      description: Stable kebab-case workflow slug.
    description:
      type: string
    connection_slug:
      type: string
      description: Authorized connection slug or planned connection slug.
    connector_slug:
      type: string
      description: >-
        Optional connector slug for planned workflows when connection_slug does
        not exist yet. Omit when connection_slug is an existing connection or a
        built-in suggested connection name.
    filter:
      type: object
      description: Optional Puffer-side JSON, regex, or limited path-expression filter.
    pattern:
      type: string
      description: Optional shorthand regex filter against event text.
    classify_prompt:
      type: string
      description: Optional classifier prompt.
    classify_model:
      type: string
      description: Optional classifier model hint.
    action:
      type: object
      description: Workflow action JSON.
    yaml_action:
      type: string
      description: >-
        Workflow action YAML or action graph YAML. Prefer `type: file_append`
        with `path: /tmp/...` for saving matching messages.
    enabled:
      type: boolean
      description: Whether the workflow starts enabled. Defaults to true.
  required: [slug, connection_slug]
  additionalProperties: false
