id: TelegramLoginStart
name: TelegramLoginStart
description: |-
  Begin logging in to Telegram with the user's personal account (NOT a
  bot). Required before installing any subscription whose `source_topic`
  is `telegram-user`.

  ## When to call

  - The user asks to watch / forward / process Telegram messages and is
    not already logged in.
  - The user explicitly asks to log in to Telegram.

  ## What you need from the user

  Just the **phone number** in international E.164 format with the
  leading `+` (e.g. `+15551234567`). Puffer uses Telegram Desktop's
  published `api_id` / `api_hash` by default, so the user does NOT need
  to register an application at my.telegram.org.

  Only ask for `api_id` and `api_hash` if:
  - The user explicitly mentions they have their own credentials, OR
  - The subscriber emitted a `login_error` mentioning `FLOOD_WAIT`,
    which can happen when shared default credentials are throttled.

  ## What happens after you call this tool

  Telegram will text a numeric code to the user's other Telegram apps.
  The subscriber emits a `login_awaiting_code` event. Ask the user for
  the code and call `TelegramLoginSubmitCode`.

  Do not call this if `SubscriptionList` shows `telegram-user` already
  in `running_subscribers` and a previous login completed — the existing
  session is reused automatically (and reconnects use the credentials
  persisted from the last successful login).
handler: runtime:workflow:telegram_login_start
approval_policy: ask
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    phone:
      type: string
      description: E.164 phone number with leading '+'.
    api_id:
      type: integer
      description: Optional. Override Telegram Desktop's default api_id.
    api_hash:
      type: string
      description: Optional. Override Telegram Desktop's default api_hash.
  required: [phone]
  additionalProperties: false
