id: Agent
name: Agent
description: Delegate a focused task to a specialized subagent and return its result.
handler: runtime:agent
approval_policy: auto
sandbox_policy: workspace-write
input_schema:
  type: object
  properties:
    description:
      type: string
      description: Short description of the delegated task.
    prompt:
      type: string
      description: Full task instructions for the subagent.
    subagent_type:
      type: string
      description: Optional agent id to run. Defaults to general-purpose.
    model:
      type: string
      description: Optional fully-qualified model override for the subagent.
    run_in_background:
      type: boolean
      description: When true, request background execution.
    cwd:
      type: string
      description: Optional working directory override for the subagent.
    isolation:
      type: string
      description: Optional isolation mode. Only worktree is recognized.
    name:
      type: string
      description: Optional label for the subagent invocation.
  required:
    - description
    - prompt
