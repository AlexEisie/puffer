id: Brief
name: Brief
description: |-
  Send a message the user will read. Text outside this tool is visible in the
  detail view, but most won't open it — the answer lives here.

  `message` supports markdown. `attachments` takes file paths (absolute or
  cwd-relative) for images, diffs, logs.

  `status` labels intent: 'normal' when replying to what they just asked;
  'proactive' when you're initiating — a scheduled task finished, a blocker
  surfaced during background work, you need input on something they haven't
  asked about. Set it honestly; downstream routing uses it.
handler: runtime:workflow:send_user_message
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    message:
      type: string
      description: The message for the user. Supports markdown formatting.
    attachments:
      type: array
      description: Optional file paths (absolute or relative to cwd) to attach. Use for photos, screenshots, diffs, logs, or any file the user should see alongside your message.
      items:
        type: string
    status:
      type: string
      enum:
        - normal
        - proactive
      description: Use proactive when you're surfacing something the user hasn't asked for and needs to see now — task completion while they're away, a blocker you hit, an unsolicited status update. Use normal when replying to something the user just said.
  required:
    - message
    - status
  additionalProperties: false
