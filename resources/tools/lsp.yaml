id: LSP
name: LSP
description: |-
  Interact with Language Server Protocol (LSP) servers to get code intelligence
  features.

  Supported operations:
  - `goToDefinition`: Find where a symbol is defined
  - `findReferences`: Find all references to a symbol
  - `diagnostics`: Get current diagnostics for a document
  - `hover`: Get hover information (documentation, type info) for a symbol
  - `documentSymbol`: Get all symbols (functions, classes, variables) in a document
  - `workspaceSymbol`: Search for symbols across the entire workspace
  - `goToImplementation`: Find implementations of an interface or abstract method
  - `prepareCallHierarchy`: Get call hierarchy item at a position (functions/methods)
  - `incomingCalls`: Find all functions/methods that call the function at a position
  - `outgoingCalls`: Find all functions/methods called by the function at a position

  All operations require:
  - `filePath`: The file to operate on
  - `line`: The line number (1-based, as shown in editors)
  - `character`: The character offset (1-based, as shown in editors)

  Note: LSP servers must be configured for the file type. If no server is
  available, an error will be returned. When a configured server binary is
  missing, the result includes install guidance when available.
handler: runtime:workflow:lsp
approval_policy: auto
sandbox_policy: read-only
input_schema:
  type: object
  properties:
    operation:
      type: string
      enum:
        - goToDefinition
        - findReferences
        - diagnostics
        - hover
        - documentSymbol
        - workspaceSymbol
        - goToImplementation
        - prepareCallHierarchy
        - incomingCalls
        - outgoingCalls
      description: The LSP operation to perform.
    filePath:
      type: string
      description: Absolute or relative file path for the operation.
    line:
      type: integer
      minimum: 1
      description: 1-based line number.
    character:
      type: integer
      minimum: 1
      description: 1-based character offset.
  required:
    - operation
    - filePath
    - line
    - character
  additionalProperties: false
