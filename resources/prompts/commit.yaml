id: commit
description: Create a git commit
allowed_tools:
  - Bash(git add:*)
  - Bash(git status:*)
  - Bash(git commit:*)
variables:
  - name: GIT_STATUS
    description: Current git status output for the workspace.
  - name: GIT_DIFF
    description: Current staged and unstaged git diff output for the workspace.
  - name: CURRENT_BRANCH
    description: Current git branch name.
  - name: RECENT_COMMITS
    description: Recent git commit history.
  - name: COMMIT_ATTRIBUTION_BLOCK
    description: Optional commit attribution text prefixed with blank lines when present.
template: |
  ## Context

  - Current git status: $GIT_STATUS
  - Current git diff (staged and unstaged changes): $GIT_DIFF
  - Current branch: $CURRENT_BRANCH
  - Recent commits: $RECENT_COMMITS

  ## Git Safety Protocol

  - NEVER update the git config
  - NEVER skip hooks (--no-verify, --no-gpg-sign, etc) unless the user explicitly requests it
  - CRITICAL: ALWAYS create NEW commits. NEVER use git commit --amend, unless the user explicitly requests it
  - Do not commit files that likely contain secrets (.env, credentials.json, etc). Warn the user if they specifically request to commit those files
  - If there are no changes to commit (i.e., no untracked files and no modifications), do not create an empty commit
  - Never use git commands with the -i flag (like git rebase -i or git add -i) since they require interactive input which is not supported

  ## Your task

  Based on the above changes, create a single git commit:

  1. Analyze all staged changes and draft a commit message:
     - Look at the recent commits above to follow this repository's commit message style
     - Summarize the nature of the changes (new feature, enhancement, bug fix, refactoring, test, docs, etc.)
     - Ensure the message accurately reflects the changes and their purpose (i.e. "add" means a wholly new feature, "update" means an enhancement to an existing feature, "fix" means a bug fix, etc.)
     - Draft a concise (1-2 sentences) commit message that focuses on the "why" rather than the "what"

  2. Stage relevant files and create the commit using HEREDOC syntax:
  ```
  git commit -m "$(cat <<'EOF'
  Commit message here.$COMMIT_ATTRIBUTION_BLOCK
  EOF
  )"
  ```

  You have the capability to call multiple tools in a single response. Stage and create the commit using a single message. Do not use any other tools or do anything else. Do not send any other text or messages besides these tool calls.
