id: relaydance
display_name: Relaydance
base_url: https://relaydance.com
default_api: openai-completions
auth_modes:
  - api_key
discovery:
  path: /v1/models
  response: open_ai_models
  api: openai-completions
  context_window: 128000
  max_output_tokens: 16384
  supports_reasoning: false
media:
  video:
    discovery:
      adapter: static
    execution:
      adapter: relaydance_video
      path: /v1/video/generations
    models:
      - id: doubao-seedance-2-0-720p
        display_name: Seedance 2.0 (720p)
        operations:
          - generate
        parameters:
          - name: duration
            label: Duration
            values: ["5", "10"]
            default: "5"
            request_field: seconds
          - name: resolution
            label: Resolution
            values: ["720p", "1080p"]
            default: "720p"
            request_field: metadata.resolution
          - name: ratio
            label: Aspect ratio
            values: ["16:9", "9:16", "1:1"]
            default: "16:9"
            request_field: metadata.ratio
