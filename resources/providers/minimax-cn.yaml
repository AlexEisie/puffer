id: minimax-cn
display_name: MiniMax CN
base_url: https://api.minimaxi.com/anthropic
default_api: anthropic-messages
auth_modes:
  - api_key
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: minimax_image
      base_url: https://api.minimaxi.com
      path: /v1/image_generation
      batch:
        mode: per_image
    models:
      - id: image-01
        display_name: Image 01
        operations:
          - generate
        axes:
          - { id: aspect_ratio, label: "Aspect ratio", role: param, control: !enum { values: ["1:1", "16:9", "4:3", "3:2", "2:3", "3:4", "9:16", "21:9"], default: "1:1" }, request_field: aspect_ratio }
          - { id: response_format, label: "Response format", role: param, control: !enum { values: ["url", "base64"], default: "base64" }, request_field: response_format }
        variants: { model_id: image-01 }
      - id: image-01-live
        display_name: Image 01 Live
        operations:
          - generate
        axes:
          - { id: aspect_ratio, label: "Aspect ratio", role: param, control: !enum { values: ["1:1", "16:9", "4:3", "3:2", "2:3", "3:4", "9:16"], default: "1:1" }, request_field: aspect_ratio }
          - { id: response_format, label: "Response format", role: param, control: !enum { values: ["url", "base64"], default: "base64" }, request_field: response_format }
        variants: { model_id: image-01-live }
models:
  - id: MiniMax-M2.7
    display_name: MiniMax-M2.7
    provider: minimax-cn
    api: anthropic-messages
    context_window: 204800
    max_output_tokens: 131072
    supports_reasoning: true
