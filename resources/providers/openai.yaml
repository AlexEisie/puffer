id: openai
display_name: OpenAI
base_url: https://api.openai.com
default_api: openai-responses
auth_modes:
  - api_key
  - oauth
discovery:
  path: /v1/models
  response: open_ai_models
  api: openai-responses
  context_window: 1047576
  max_output_tokens: 128000
  supports_reasoning: true
media:
  image:
    discovery:
      adapter: static
    execution:
      adapter: images_json
      path: /v1/images/generations
      batch:
        mode: per_image
    models:
      - id: gpt-image-2
        display_name: GPT Image 2
        operations:
          - generate
        axes:
          - { id: size, label: "Size", role: param, control: !enum { values: ["auto", "1024x1024", "1024x1536", "1536x1024", "2048x2048", "2048x1152", "2560x1440", "3840x2160", "2160x3840"], default: "auto" }, request_field: size }
          - { id: quality, label: "Quality", role: param, control: !enum { values: ["auto", "low", "medium", "high"], default: "auto" }, request_field: quality }
          - { id: output_format, label: "Output format", role: param, control: !enum { values: ["png", "jpeg", "webp"], default: "png" }, request_field: output_format }
        variants: { model_id: gpt-image-2 }
      - id: gpt-image-1.5
        display_name: GPT Image 1.5
        operations:
          - generate
        axes:
          - { id: size, label: "Size", role: param, control: !enum { values: ["auto", "1024x1024", "1024x1536", "1536x1024"], default: "auto" }, request_field: size }
          - { id: quality, label: "Quality", role: param, control: !enum { values: ["auto", "low", "medium", "high"], default: "auto" }, request_field: quality }
          - { id: output_format, label: "Output format", role: param, control: !enum { values: ["png", "jpeg", "webp"], default: "png" }, request_field: output_format }
        variants: { model_id: gpt-image-1.5 }
      - id: chatgpt-image-latest
        display_name: ChatGPT Image Latest
        operations:
          - generate
        axes:
          - { id: size, label: "Size", role: param, control: !enum { values: ["auto", "1024x1024", "1024x1536", "1536x1024"], default: "auto" }, request_field: size }
          - { id: quality, label: "Quality", role: param, control: !enum { values: ["auto", "low", "medium", "high"], default: "auto" }, request_field: quality }
          - { id: output_format, label: "Output format", role: param, control: !enum { values: ["png", "jpeg", "webp"], default: "png" }, request_field: output_format }
        variants: { model_id: chatgpt-image-latest }
      - id: gpt-image-1
        display_name: GPT Image 1
        operations:
          - generate
        axes:
          - { id: size, label: "Size", role: param, control: !enum { values: ["auto", "1024x1024", "1024x1536", "1536x1024"], default: "auto" }, request_field: size }
          - { id: quality, label: "Quality", role: param, control: !enum { values: ["auto", "low", "medium", "high"], default: "auto" }, request_field: quality }
          - { id: output_format, label: "Output format", role: param, control: !enum { values: ["png", "jpeg", "webp"], default: "png" }, request_field: output_format }
        variants: { model_id: gpt-image-1 }
      - id: gpt-image-1-mini
        display_name: GPT Image 1 Mini
        operations:
          - generate
        axes:
          - { id: size, label: "Size", role: param, control: !enum { values: ["auto", "1024x1024", "1024x1536", "1536x1024"], default: "auto" }, request_field: size }
          - { id: quality, label: "Quality", role: param, control: !enum { values: ["auto", "low", "medium", "high"], default: "auto" }, request_field: quality }
          - { id: output_format, label: "Output format", role: param, control: !enum { values: ["png", "jpeg", "webp"], default: "png" }, request_field: output_format }
        variants: { model_id: gpt-image-1-mini }
models:
  - id: gpt-5.5
    display_name: GPT-5.5
    provider: openai
    api: openai-responses
    context_window: 1041920
    max_output_tokens: 128000
    supports_reasoning: true
  - id: gpt-5.4
    display_name: GPT-5.4
    provider: openai
    api: openai-responses
    context_window: 1047576
    max_output_tokens: 128000
    supports_reasoning: true
  - id: gpt-5.4-mini
    display_name: GPT-5.4 Mini
    provider: openai
    api: openai-responses
    context_window: 400000
    max_output_tokens: 128000
    supports_reasoning: true
  - id: gpt-5.4-nano
    display_name: GPT-5.4 Nano
